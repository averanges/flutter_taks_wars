name: flutter_task_wars
description: "A new Flutter project."

# Prevent publishing to pub.dev
publish_to: 'none'

# Application version (major.minor.patch+build)
version: 1.0.0+1

environment:
  # Required Dart SDK version
  sdk: ^3.8.0
  # Required Flutter SDK version
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------------- Local Storage ----------------------
  shared_preferences: ^2.5.3            # Local storage for small data (e.g., tokens, settings).

  # ---------------------- Navigation -------------------------
  go_router: ^17.0.0                    # Declarative routing with deep linking support.

  # ---------------------- Utilities --------------------------
  intl: ^0.20.2                         # Date and number formatting.
  equatable: ^2.0.7                     # Value-based equality for entities and models.
  collection: ^1.19.1                   # Extended utilities for working with collections.
  uuid: ^4.5.2                          # UUID generation (local task IDs).
  image_picker: ^1.2.1                  # Image selection from gallery or camera.

  # ---------------------- State Management --------------------
  bloc: ^9.1.0                          # BLoC pattern for business logic.
  bloc_concurrency: ^0.3.0              # Concurrency utilities for BLoC.
  flutter_bloc: ^9.1.1                  # Flutter widgets for BLoC integration.

  # ---------------------- Dependency Injection ----------------
  get_it: ^8.0.3                        # Service locator.
  injectable: ^2.5.0                    # Code generation for dependency injection.

  # ---------------------- Networking --------------------------
  dio: ^5.9.0                           # HTTP client for REST APIs.
  retrofit: ^4.9.0                      # Code generator for API clients.
  json_annotation: ^4.9.0               # JSON serialization annotations.

  # ---------------------- Logging -----------------------------
  talker: ^5.0.1                        # Logging and error tracking.
  talker_flutter: ^5.0.1                # Flutter integration for Talker.
  talker_dio_logger: ^5.0.1             # Dio request/response logging.

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0                 # Recommended lints for Flutter projects.

  # ---------------------- Code Generation ---------------------
  build_runner: ^2.4.15                 # Code generation runner.
  flutter_gen_runner: ^5.9.0            # Asset and resource generator.
  json_serializable: ^6.9.4             # JSON model generation.
  injectable_generator: ^2.3.0          # DI code generator.
  hive_ce_generator: ^1.9.2             # Hive TypeAdapter generator.
  retrofit_generator: ^10.0.0           # Retrofit client generator.

flutter_gen:
  output: lib/resources/generated
  line_length: 120
  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true

  fonts:
    - family: Sf Ui Display
      fonts:
        - asset: assets/fonts/sf_ui_display/semibold.ttf
          weight: 600
        - asset: assets/fonts/sf_ui_display/medium.ttf
          weight: 500
        - asset: assets/fonts/sf_ui_display/regular.ttf
          weight: 400
